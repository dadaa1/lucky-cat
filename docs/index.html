<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>自建采集接收站</title>
    <!-- 1. 引入 jQuery -->
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.4.min.js"></script>

    <!-- 2. 引入更加稳定的 RequireJS 官方 CDN，并移除导致 404 的旧链接 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
        background: #f5f5f5;
      }
      #main {
        border: 2px dashed #ccc;
        min-height: 200px;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
      }
      .log-box {
        margin-top: 20px;
        background: #1e1e1e;
        color: #00ff00;
        padding: 15px;
        border-radius: 5px;
        font-family: monospace;
        max-height: 300px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h2>🤖 大山的数据接收容器</h2>
    <p>当前页面正在等待插件隐藏的 iframe 建立连接...</p>

    <div id="main">
      <h3>系统状态：准备就绪</h3>
      <div class="log-box" id="log">等待数据中...</div>
    </div>

    <script>
      // 日志打印小工具
      function log(msg) {
        const box = document.getElementById('log');
        if (box.innerText === '等待数据中...') box.innerText = '';
        box.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      }

      // 🛡️ 核心修复：把所有依赖 requirejs 的代码，包裹在一个安全检查定时器里
      // 确保 requirejs 变量在内存中完全存在后再执行伪装
      function initMocks() {
        if (typeof requirejs === 'undefined' || typeof define === 'undefined') {
          log('⚠️ RequireJS 仍在加载中，正在重试...');
          setTimeout(initMocks, 50); // 每 50 毫秒检查一次
          return;
        }

        log('✅ RequireJS 环境检测成功，开始注入伪装模块...');

        // ==========================================
        // 🛠️ 第一步：安全伪装网站核心模块
        // ==========================================
        define('application', [], function () {
          log("插件成功调用了 requirejs('./application')！正在下发伪装对象...");
          return {
            isFirstUse: function () {
              return true;
            },
            hideTour: function () {
              log('执行了：hideTour()');
            },
            getApplicationProfileModel: function () {
              return {
                set: function (obj) {
                  log('修改设置: ' + JSON.stringify(obj));
                },
              };
            },
            homeView: {
              previewView: {
                close: function (flag) {
                  log('执行了：close(' + flag + ')');
                },
              },
            },
          };
        });

        // ==========================================
        // ⚡ 第二步：开始监听并应答插件的消息
        // ==========================================
        window.addEventListener('message', function (event) {
          if (event.source === window) return;

          const message = event.data;
          log(`拦截到跨域消息类型: ${message.type}`);

          // 1. 自动握手阶段
          if (message.type === undefined && window.parent !== window) {
            const urlParams = new URLSearchParams(window.location.search);
            const uniqueId = urlParams.get('uniqueId');

            if (uniqueId) {
              log(`向插件外层发送 loaded 握手信号，唯一 ID: ${uniqueId}`);
              window.parent.postMessage(
                {
                  type: 'loaded',
                  uniqueId: parseInt(uniqueId),
                },
                '*'
              );
            }
          }

          // 2. 响应 'getFiles' 指令
          if (message.type === 'getFiles') {
            const uniqueId = message.uniqueId;
            const fileIds = message.data.fileIds;
            log(`🎉 抓到了！需要采集的知乎问答 ID 列表: ${JSON.stringify(fileIds)}`);

            // 模拟文件数据喂回给插件
            const mockData = [
              {
                filename: 'zhihu_answer_' + fileIds[0] + '.txt',
                data: new Blob([`自建网页成功拦截，ID为: ${fileIds[0]}`], { type: 'text/plain' }),
                meta: { source: 'Dashan_Interceptor', originalIds: fileIds },
              },
            ];

            event.source.postMessage(
              {
                type: 'getFilesResult',
                uniqueId: uniqueId,
                data: mockData,
              },
              event.origin
            );
          }
        });

        // 主动触发初次握手
        const urlParams = new URLSearchParams(window.location.search);
        const uniqueId = urlParams.get('uniqueId');
        if (uniqueId && window.parent !== window) {
          window.parent.postMessage({ type: 'loaded', uniqueId: parseInt(uniqueId) }, '*');
        }
      }

      // 启动安全检查流
      initMocks();
    </script>
  </body>
</html>
